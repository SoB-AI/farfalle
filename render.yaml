services:
    - type: web
    name: farfalle-backend
    runtime: python
    repo: https://github.com/SoB-AI/farfalle
    plan: free
    envVars:
            - key: OPENROUTER_API_KEY
        sync: false
            - key: SEARCH_PROVIDER
        value: searxng
    region: Singapore 
    buildCommand: pip install poetry && poetry install
    startCommand: poetry run uvicorn src.backend.main:app --host 0.0.0.0 --port $PORT
    rootDir: ""
